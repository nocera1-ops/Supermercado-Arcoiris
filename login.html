<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperMercado Express - Login & Registro</title>
    <style>
        :root {
    /* Paleta de colores inspirada en un Arcoiris moderno y fresco */
    --primary-color: #3a86ff;   /* Azul brillante para confianza */
    --accent-red: #ff006e;      /* Rosa/Rojo para ofertas */
    --accent-orange: #ff5a00;   /* Naranja para botones y carritos */
    --accent-green: #38b000;    /* Verde para productos frescos/saludables */
    --dark-color: #1a1d20;
    --light-color: #f8f9fa;
    --white: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    /* Fondo sutil degradado con los tonos suaves del arcoiris */
    background: linear-gradient(135deg, #e8f0fe 0%, #fef3e8 50%, #eafaf1 100%);
    display: flex;
    flex-direction: column; /* Permite que el header se coloque arriba del contenedor */
    align-items: center;
    min-height: 100vh;
    padding: 0 20px 40px 20px;
}

/* --- ESTILOS PARA TU HEADER DE CONTACTO --- */
#contacto-header {
    width: 100%;
    max-width: 450px; /* Alineado exactamente con el ancho del formulario */
    margin-top: 30px;
    margin-bottom: 15px;
    display: flex;
    justify-content: flex-start;
}

.btn-volver {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: #555;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 8px 16px;
    background-color: var(--white);
    border-radius: 20px; /* Estilo píldora moderno */
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    transition: all 0.2s ease;
    border: 1px solid rgba(0,0,0,0.05);
}

.btn-volver:hover {
    color: var(--primary-color);
    transform: translateX(-3px); /* Efecto sutil de empuje hacia la izquierda */
    box-shadow: 0 6px 15px rgba(58, 134, 255, 0.15);
}

/* --- CONTENEDOR PRINCIPAL --- */
.container {
    background-color: var(--white);
    border-radius: 20px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    width: 100%;
    max-width: 450px;
    padding: 2.5rem 2rem;
    transition: all 0.3s ease;
    border-top: 5px solid var(--primary-color); /* Detalle de color superior */
}

.header {
    text-align: center;
    margin-bottom: 2rem;
}

/* Estilo temático para el título Arcoiris */
.header h1 {
    font-size: 2.1rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(45deg, var(--accent-red), var(--accent-orange), var(--primary-color), var(--accent-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
}

.header p {
    color: #666;
    font-size: 0.9rem;
    font-weight: 500;
}

/* Selector de pestañas (Login / Registro) */
.tabs {
    display: flex;
    background-color: var(--light-color);
    padding: 6px;
    border-radius: 12px;
    margin-bottom: 2rem;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    font-size: 0.95rem;
    font-weight: 700;
    color: #777;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s ease;
}

.tab-btn.active {
    background-color: var(--white);
    color: var(--primary-color);
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
}

/* Formularios e Inputs */
.form-form {
    display: none;
    flex-direction: column;
    gap: 1.2rem;
}

.form-form.active {
    display: flex;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.input-group label {
    font-size: 0.85rem;
    color: var(--dark-color);
    font-weight: 700;
}

.input-group input {
    padding: 14px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.2s ease;
}

.input-group input:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.15);
}

/* Opciones (Recordarme / Olvidé contraseña) */
.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
}

.form-options a {
    color: var(--primary-color);
    text-decoration: none;
    font-weight: 600;
}

.form-options a:hover {
    text-decoration: underline;
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-weight: 500;
    color: #555;
}

.checkbox-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--primary-color); /* Color del check match con la marca */
    cursor: pointer;
}

/* Botón de envío llamativo (Estilo Arcoiris) */
.btn-submit {
    background: linear-gradient(135deg, var(--accent-orange) 0%, #e04e00 100%);
    color: var(--white);
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(255, 90, 0, 0.25);
    transition: all 0.2s ease;
    margin-top: 0.5rem;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 90, 0, 0.35);
}

.btn-submit:active {
    transform: translateY(0);
}

/* Términos y condiciones */
.terms {
    font-size: 0.8rem;
    color: #666;
    line-height: 1.5;
}

.terms a {
    color: var(--primary-color);
    font-weight: 600;
}
    </style>
</head>
<body>
    <header id="contacto-header">
    <a href="index.html" class="btn-volver">&#8592; Volver</a>
  </header>

    <div class="container">
        <div class="header">
            <h1>SuperMercado <span>Express</span></h1>
            <p id="header-subtitle">¡Haz tu súper sin salir de casa!</p>
        </div>

        <!-- Selector de pestañas -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
            <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
        </div>

        <!-- Formulario de Login -->
        <form id="login-form" class="form-form active" onsubmit="handleSubmit(event, 'login')">
            <div class="input-group">
                <label for="login-email">Correo Electrónico</label>
                <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="input-group">
                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" placeholder="Tu contraseña" required>
            </div>

            <div class="form-options">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Recordarme</label>
                </div>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-submit">Entrar a mi Súper</button>
        </form>

        <!-- Formulario de Registro -->
        <form id="register-form" class="form-form" onsubmit="handleSubmit(event, 'register')">
            <div class="input-group">
                <label for="reg-name">Nombre Completo</label>
                <input type="text" id="reg-name" placeholder="Juan Pérez" required>
            </div>

            <div class="input-group">
                <label for="reg-email">Correo Electrónico</label>
                <input type="email" id="reg-email" placeholder="juan@correo.com" required>
            </div>

            <div class="input-group">
                <label for="reg-phone">Teléfono / Celular (Para envíos)</label>
                <input type="tel" id="reg-phone" placeholder="123456789" required>
            </div>
            
            <div class="input-group">
                <label for="reg-password">Contraseña</label>
                <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>

            <div class="checkbox-group terms">
                <input type="checkbox" id="accept-terms" required>
                <label for="accept-terms">Acepto los <a href="#">Términos y Condiciones</a> y el aviso de privacidad de entrega a domicilio.</label>
            </div>

            <button type="submit" class="btn-submit">Crear Cuenta y Comprar</button>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            // Botones
            const buttons = document.querySelectorAll('.tab-btn');
            // Formularios
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const subtitle = document.getElementById('header-subtitle');

            buttons.forEach(btn => btn.classList.remove('active'));

            if (tab === 'login') {
                buttons[0].classList.add('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                subtitle.innerText = "¡Haz tu súper sin salir de casa!";
            } else {
                buttons[1].classList.add('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
                subtitle.innerText = "Regístrate para llenar tu carrito";
            }
        }

        function handleSubmit(event, type) {
            event.preventDefault();
            
            if (type === 'login') {
                const email = document.getElementById('login-email').value;
                alert(`¡Bienvenido de nuevo! Iniciando sesión con: ${email}.\n(Aquí conectarías con tu base de datos)`);
            } else {
                const name = document.getElementById('reg-name').value;
                alert(`¡Gracias por registrarte, ${name}! Tu cuenta de Súper ha sido creada.\n(Aquí conectarías con tu base de datos)`);
            }
        }
    </script>
</body>
</html>
